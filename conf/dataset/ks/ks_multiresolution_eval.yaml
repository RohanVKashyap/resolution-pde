# Multi-resolution training analysis evaluation config
# Use this for evaluating multiple models trained at different alphas

dataset_params:
  _target_: dataloaders.ks_naive_markov.ks_markov_dataset  # Use single-resolution dataset for eval
  saved_folder: "/data/user_data/rvk/ks/res_512/visc_0.075_L64.0_lmax8_et5.0_nte51_nt51"
  filename: "KS_train_2048.h5"  # Full resolution test data
  viscosity: 0.075
  L: 64.0
  lmax: 8
  et: 5.0
  nte: 51
  nt: 51
  reduced_batch: 1
  reduced_resolution_t: 1
  reduced_resolution: 1  # NO downsampling - test on full resolution
  data_normalizer: true
  normalization_type: simple
  num_samples_max: -1
  use_low_pass_filter: false  # NO filtering for evaluation
  
# Evaluation settings
resize_to_train: false
evaluation_type: naive_downsample
window_size: 15
rollout_steps: 16
original_res: 512
max_test_resolution: 512  # Test on full resolution
train_mres: true
pde: ks

# Checkpoint paths for different alphas
checkpoint_paths:
  0.0: "checkpoints/ffno1d/ks_5537837.pt"
  0.05: "checkpoints/ffno1d/ks_5533124.pt"
  0.1: "checkpoints/ffno1d/ks_5533125.pt"
  0.15: "checkpoints/ffno1d/ks_5545188.pt"
  0.2: "checkpoints/ffno1d/ks_5533127.pt"
  0.4: "checkpoints/ffno1d/ks_5537836.pt"
  1.0: "checkpoints/ffno1d/ks_5545151.pt"